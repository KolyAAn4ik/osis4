name: CI Pipeline

on:
  push:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build app image
        run: |
          docker build -t laba4-app -f docker/Dockerfile .

      - name: Run app container
        run: |
          docker run -d --name laba4-test -p 8000:8000 laba4-app
          sleep 5

      - name: Test app is healthy
        run: |
          curl --fail http://localhost:8000/ || exit 1

      - name: Cleanup
        run: |
          docker stop laba4-test
          docker rm laba4-test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: success()

    steps:
      - name: Deploy via SSH to localhost
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.PROJECT_PATH }}
            git pull
            docker compose -f docker/docker-compose.yml up -d --build
            docker system prune -f